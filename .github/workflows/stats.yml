name: "Generate Stats Images"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - .github/workflows/stats.yml
      - .github/workflows/profile-readme.yml
      - .github/workflows/project-spotlight.yml
      - README.md
      - generated/**
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: profile-stats-images
  cancel-in-progress: true

jobs:
  build:
    name: "Generate statistics"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7

      - name: "Set up Python 3.11"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      - name: "Install requirements"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: "Generate images"
        env:
          COUNT_STATS_FROM_FORKS: false
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          EXCLUDED: ${{ secrets.EXCLUDED }}
          EXCLUDED_LANGS: ${{ secrets.EXCLUDE_LANGS }}
        run: python src/gen_images.py

      - name: "Publish generated assets"
        run: |
          cp -R generated /tmp/generated
          git config user.name "github-stats[bot]"
          git config user.email "62766066+github-actions[bot]@users.noreply.github.com"
          git fetch origin output || true
          git switch output 2>/dev/null || git switch --track origin/output 2>/dev/null || git switch --orphan output
          mkdir -p generated
          cp -R /tmp/generated generated
          git add generated/overview.svg generated/languages.svg
          git commit -m "ci: update generated stats" || exit 0
          git push origin output
