name: "Publish project spotlight cards"

on:
  workflow_run:
    workflows: ["Update profile README"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run id of the profile README workflow"
        required: false
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: profile-spotlight-cards
  cancel-in-progress: true

jobs:
  publish:
    name: "Publish spotlight cards"
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN_1 }}

      - name: "Resolve source run id"
        id: source-run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.source_run_id }}" ]; then
              echo "::error::Missing source_run_id for workflow_dispatch"
              exit 1
            fi
            echo "run-id=${{ github.event.inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run-id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"

      - name: "Trace triggering run"
        run: |
          echo "event: ${{ github.event_name }}"
          echo "run-id: ${{ steps.source-run.outputs.run-id }}"

      - name: "Download spotlight cards"
        uses: actions/download-artifact@v4
        with:
          name: project-spotlight-cards
          run-id: ${{ steps.source-run.outputs.run-id }}
          path: /tmp/project-spotlight

      - name: "Publish cards to output branch"
        run: |
          set -euo pipefail
          shopt -s nullglob
          cards=(/tmp/project-spotlight/project-spotlight-*.svg)
          if (( ${#cards[@]} == 0 )); then
            echo "::error::No spotlight cards found in artifact"
            exit 1
          fi

          git fetch origin output || true
          git switch output 2>/dev/null || git switch --track origin/output 2>/dev/null || git switch --orphan output
          mkdir -p generated
          cp "${cards[@]}" generated/

          cards=(generated/project-spotlight-*.svg)
          if (( ${#cards[@]} == 0 )); then
            echo "::error::Failed to copy spotlight cards into output branch"
            exit 1
          fi

          git add -f "${cards[@]}"
          if git diff --cached --quiet -- "${cards[@]}"; then
            exit 0
          fi

          git config user.name "[Bot] NotAShelf"
          git config user.email "raf@notashelf.dev"
          git commit -m "ci: update project spotlight cards"
          git push origin output
