name: "Publish project spotlight cards"

on:
  workflow_run:
    workflows: ["Update profile README"]
    branches: ["main"]
    types: [completed]

permissions:
  contents: write
  actions: read

concurrency:
  group: profile-spotlight-cards
  cancel-in-progress: true

jobs:
  publish:
    name: "Publish spotlight cards"
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN_1 }}

      - name: "Resolve source workflow run"
        id: source-run
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_1 }}
        run: |
          set -euo pipefail

          source_run_id="$(jq -r '.workflow_run.id // empty' "$GITHUB_EVENT_PATH")"
          source_workflow_name=""
          if [ -n "$source_run_id" ]; then
            source_workflow_name="$(gh api repos/$GITHUB_REPOSITORY/actions/runs/$source_run_id --jq '.name')"
          fi

          if [ -z "$source_run_id" ] || [ "$source_workflow_name" != "Update profile README" ]; then
            source_run_id="$(
              gh api repos/$GITHUB_REPOSITORY/actions/runs \
                --paginate \
                --jq '
                  [
                    .workflow_runs[]
                    | select(.name == "Update profile README")
                    | select(.conclusion == "success")
                    | select(.head_branch == "main")
                    | .id
                  ][0]
                '
            )"
          fi

          if [ -z "$source_run_id" ] || [ "$source_run_id" = "null" ]; then
            echo "::error::Could not resolve source workflow run id"
            exit 1
          fi

          echo "run-id=$source_run_id" >> "$GITHUB_OUTPUT"

      - name: "Download spotlight cards"
        uses: actions/download-artifact@v4
        with:
          name: project-spotlight-cards
          run-id: ${{ steps.source-run.outputs.run-id }}
          path: /tmp/project-spotlight

      - name: "Publish cards to output branch"
        run: |
          shopt -s nullglob
          cards=(/tmp/project-spotlight/project-spotlight-*.svg)
          if (( ${#cards[@]} == 0 )); then
            echo "::error::No spotlight cards found in artifact"
            exit 1
          fi

          git fetch origin output || true
          git switch output 2>/dev/null || git switch --track origin/output 2>/dev/null || git switch --orphan output
          mkdir -p generated
          cp "${cards[@]}" generated/

          cards=(generated/project-spotlight-*.svg)
          if (( ${#cards[@]} == 0 )); then
            echo "::error::Failed to copy spotlight cards into output branch"
            exit 1
          fi

          git add -f "${cards[@]}"
          if git diff --cached --quiet -- "${cards[@]}"; then
            exit 0
          fi

          git config user.name "[Bot] NotAShelf"
          git config user.email "raf@notashelf.dev"
          git commit -m "ci: update project spotlight cards"
          git push origin output
