name: "Automatic updates of profile statistics"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - .github/workflows/stats.yml
      - .github/workflows/rating-chart.yml
      - README.md
      - generated/**
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: true

jobs:
  readme:
    name: "Render README"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_TOKEN_1 }}

      - name: "Setup Python"
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "src/requirements.txt"

      - name: "Install requirements"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt

      - name: "Render README"
        run: python src/gen_readme.py --spotlight-seed "${{ github.run_id }}-${{ github.run_attempt }}"

      - name: "Randomize next schedule"
        run: python src/gen_random_workflow.py > .github/workflows/rating-chart.yml

      - name: "Stage generated cards"
        run: |
          mkdir -p /tmp/project-spotlight
          cp generated/project-spotlight-*.svg /tmp/project-spotlight/

      - name: "Commit README updates"
        run: |
          if ! git diff --quiet -- README.md .github/workflows/rating-chart.yml; then
            git config user.name "[Bot] NotAShelf"
            git config user.email "raf@notashelf.dev"
            git add README.md .github/workflows/rating-chart.yml
            git commit -m "ci: update README with new statistics"
            git push
          fi

      - name: "Publish spotlight cards"
        run: |
          git fetch origin output || true
          git switch output 2>/dev/null || git switch --track origin/output 2>/dev/null || git switch --orphan output
          mkdir -p generated
          cp /tmp/project-spotlight/project-spotlight-*.svg generated/

          if git diff --quiet -- generated/project-spotlight-*.svg; then
            exit 0
          fi

          git config user.name "[Bot] NotAShelf"
          git config user.email "raf@notashelf.dev"
          git add generated/project-spotlight-*.svg
          git commit -m "ci: update project spotlight cards"
          git push origin output
