<svg width="{{ WIDTH }}" height="{{ HEIGHT }}" viewBox="0 0 {{ WIDTH }} {{ HEIGHT }}" xmlns="http://www.w3.org/2000/svg" role="img">
<title>{{ TITLE }} project spotlight card</title>
<defs>
  <linearGradient id="card-face" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#201914"/>
    <stop offset="48%" stop-color="#111018"/>
    <stop offset="100%" stop-color="#08070b"/>
  </linearGradient>
  <radialGradient id="halo" cx="50%" cy="35%" r="58%">
    <stop offset="0%" stop-color="#d7b46a" stop-opacity="0.24"/>
    <stop offset="46%" stop-color="#7f4f3a" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#08070b" stop-opacity="0"/>
  </radialGradient>
  <pattern id="fine-lines" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <path d="M0 0 H12" stroke="#47352c" stroke-opacity="0.28" stroke-width="1"/>
  </pattern>
</defs>
<style>
  text {
    font-family: Georgia, Cambria, "Times New Roman", serif;
    letter-spacing: 0;
  }
  .numeral { fill: #d7b46a; font-size: 15px; font-weight: 800; }
  .arcana { fill: #d7b46a; font-size: 12px; font-weight: 800; text-transform: uppercase; }
  .title { fill: #f5efe3; font-size: 32px; font-weight: 850; }
  .suit { fill: #b8aa92; font-size: 13px; font-weight: 750; }
  .body { fill: #ded3bf; font-size: 15px; }
  .rule { stroke: #5a4437; stroke-width: 1.25; }
  .gold { fill: none; stroke: #d7b46a; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .green { fill: none; stroke: #6f8396; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .thin { stroke-width: 1.2; }
  .star { fill: none; stroke: #d7b46a; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .star-fill { fill: rgba(215, 180, 106, 0.08); stroke: #d7b46a; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .ink { fill: none; stroke: #151017; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
  .ink-fill { fill: #151017; stroke: #d7b46a; stroke-width: 1.2; }
  .card-bg { fill: #111018; }
  .halo-ring { fill: none; stroke: #5a4437; stroke-width: 1; }
  .hill { fill: rgba(215, 180, 106, 0.08); stroke: #5a4437; stroke-width: 1; }
  .water { fill: none; stroke: #6f8396; stroke-width: 1.3; stroke-linecap: round; }
  .robe { fill: #171018; stroke: #d7b46a; stroke-width: 1.3; stroke-linejoin: round; }
  .cloak { fill: #151017; stroke: #5a4437; stroke-width: 1.3; stroke-linejoin: round; }
  .paper { fill: rgba(215, 180, 106, 0.1); stroke: #d7b46a; stroke-width: 1.2; stroke-linejoin: round; }
  .book { fill: #151017; stroke: #d7b46a; stroke-width: 1.3; }
  .anvil { fill: #151017; stroke: #d7b46a; stroke-width: 1.4; stroke-linejoin: round; }
  .hammer { fill: #151017; stroke: #d7b46a; stroke-width: 1.3; }
  .moon { fill: #d7b46a; opacity: 0.9; }
  .sun { fill: #9b5c42; }
  .skin { fill: #9b5c42; }
  .spark { fill: none; stroke: #9b5c42; stroke-width: 1.4; stroke-linecap: round; }
  .ornament { fill: none; stroke: #d7b46a; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; opacity: 0.72; }
  .ornament circle { fill: #d7b46a; stroke: none; opacity: 0.72; }
  .wear { fill: none; stroke: #c8ad75; stroke-width: 0.8; stroke-linecap: round; opacity: 0.18; }
  .wear circle { fill: #c8ad75; stroke: none; opacity: 0.16; }
</style>
<rect x="10" y="10" width="{{ OUTER_WIDTH }}" height="{{ OUTER_HEIGHT }}" rx="22" fill="#05070b"/>
<rect x="15" y="15" width="{{ FACE_WIDTH }}" height="{{ FACE_HEIGHT }}" rx="18" fill="url(#card-face)" stroke="#4d3a30" stroke-width="2"/>
<rect x="29" y="29" width="{{ TEXTURE_WIDTH }}" height="{{ TEXTURE_HEIGHT }}" rx="13" fill="url(#fine-lines)" opacity="0.5"/>
<rect x="29" y="29" width="{{ TEXTURE_WIDTH }}" height="{{ TEXTURE_HEIGHT }}" rx="13" fill="none" stroke="#342b28"/>
<rect x="43" y="43" width="{{ BORDER_WIDTH }}" height="{{ BORDER_HEIGHT }}" rx="8" fill="none" stroke="#d7b46a" stroke-opacity="0.65"/>
{{ ORNAMENTS }}
<circle cx="{{ CENTER_X }}" cy="178" r="96" fill="url(#halo)"/>
<text x="{{ CENTER_X }}" y="64" class="numeral" text-anchor="middle">{{ NUMERAL }}</text>
<text x="{{ CENTER_X }}" y="91" class="arcana" text-anchor="middle">{{ ARCANA }}</text>
{{ SCENE }}
<text x="{{ CENTER_X }}" y="292" class="title" text-anchor="middle">{{ PROJECT_TITLE }}</text>
<text x="{{ CENTER_X }}" y="320" class="suit" text-anchor="middle">{{ SUIT }}</text>
<line x1="72" y1="340" x2="{{ CONTENT_RIGHT }}" y2="340" class="rule"/>
{{ DESCRIPTION }}
</svg>
